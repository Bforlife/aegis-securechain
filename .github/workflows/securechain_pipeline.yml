name: SecureChain Keyless Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:

  securechain:

    runs-on: self-hosted


    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Keyless Sign Image
        run: |
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/securechain_pipeline.yml@refs/heads/main" \
            $IMAGE_NAME:${{ github.sha }}

      - name: Generate SBOM
        run: |
          trivy image \
          --format cyclonedx \
          -o sbom.json \
          $IMAGE_NAME:${{ github.sha }}

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
