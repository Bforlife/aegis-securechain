name: SecureChain Keyless Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/aegis-securechain

jobs:
  securechain:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Environment
        run: |
          echo "Runner: $(hostname)"
          docker --version
          git --version

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Cosign
        run: |
          cosign version

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.65.0_Linux-64bit.deb
            sudo dpkg -i trivy_0.65.0_Linux-64bit.deb || sudo apt-get install -f -y
          fi

      - name: Verify Trivy
        run: |
          trivy --version

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Keyless Sign Image
        run: |
          cosign sign --yes $IMAGE_NAME:${{ github.sha }}

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            $IMAGE_NAME:${{ github.sha }}

      - name: Generate SBOM
        run: |
          trivy image \
            --format cyclonedx \
            -o sbom.json \
            $IMAGE_NAME:${{ github.sha }}

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
